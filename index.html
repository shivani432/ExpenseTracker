<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
   
</head>

<body>
    

<div id="expenseContainer">

    <h1>Expense Tracker</h1>

    <input type="text" id="expenseName" placeholder="Enter expense">

    <input type="number" id="expenseAmount" placeholder="Enter amount">

 <!-- Transaction Type -->
<select id="transactionType">

    <option value="Expense">Expense</option>

    <option value="Income">Income</option>

</select>   


<input type="text" id="expenseCategory" placeholder="Enter Category">

<input type="date" id="expenseDate">

<button id="addBtn">Add Expense</button>


<h3>💰 Income : ₹<span id="totalIncome">0</span></h3>

<h3>💸 Expense : ₹<span id="totalExpense">0</span></h3>

<h3>🏦 Balance : ₹<span id="balance">0</span></h3>

<h3>📋 Total Transactions : <span id="transactionCount">0</span></h3>

<h3>📊 Showing : <span id="showingCount">0</span></h3>

    <!-- Search Expense -->
<input type="text" id="searchExpense" placeholder="Search Expense">
<select id="filterType">

    <option value="All">All</option>

    <option value="Income">Income</option>

    <option value="Expense">Expense</option>

</select>

<h3>Total: ₹<span id="total">0</span></h3>

<ul id="expenseList"></ul>

<!-- Expense Chart -->
<canvas id="expenseChart"></canvas>

</div>

    

    <!-- Chart.js Library -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>
</html>
